<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VoTal9ja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #E63946;
            --navy: #1d3557;
            --overlay: rgba(255, 255, 255, 0.12); /* Matched to the transparent registration foundation */
            --bg: #0b132b;
            --accent: #457b9d;
            --text-gold: #f1faee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(rgba(11, 19, 43, 0.75), rgba(11, 19, 43, 0.85)), url('https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Ambient glowing background behind card - Exactly matched to Admin */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(230, 57, 70, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* LED Moving Border Asset Track Outer Shell Layer - Formatted to Match Admin Depth Parameters */
        .login-card-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 3px; /* Controls exact density/thickness of the tracking LED line */
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(230, 57, 70, 0.15);
            z-index: 1;
        }

        .login-card-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                var(--primary), 
                transparent, 
                var(--accent), 
                transparent, 
                var(--primary)
            );
            animation: ledTrackRotate 4s linear infinite;
            z-index: -2;
        }

        @keyframes ledTrackRotate {
            100% { transform: rotate(360deg); }
        }

        /* Glassmorphism Card Surface - Modified to inherit fully transparent administration backdropping */
        .login-card {
            background: transparent; /* Fully transparent container surface matching Admin */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            padding: 50px 40px;
            border-radius: 27px; /* Subtly shorter to clear inner wrapper arc */
            text-align: center;
            position: relative;
        }

        /* Background occlusion sheet behind text to secure readability - Extracted from Admin */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 19, 43, 0.45);
            border-radius: 27px;
            z-index: -1;
            pointer-events: none;
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 10px;
            text-transform: unset;
            letter-spacing: 1px;
        }

        .brand-logo span { color: var(--primary); }

        h2 { color: #ffffff; font-size: 1.4rem; margin-bottom: 30px; font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 40px;
            color: #E63946; /* Synced indicator icons to brand primary */
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #ffffff; /* Swapped to white for legibility */
            font-weight: 600;
            padding-left: 5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            background: transparent; /* Made fully transparent */
            color: #ffffff; /* Written text is white */
            font-weight: 500;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(230, 57, 70, 0.3);
            background: transparent; /* Remains fully transparent on focus */
            color: #ffffff;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary); /* Swapped base to red matching pay button setup */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);
        }

        .btn-login:hover {
            background: var(--navy);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 53, 87, 0.4);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #eee;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-links a:hover { color: #ffffff; }

        /* Flash Message Styling */
        .flash-msg {
            padding: 10px;
            background: rgba(230, 57, 70, 0.2); /* Made flash transparent and matching scheme */
            color: #ffffff;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--primary);
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);
        }

        @media (max-width: 480px) {
            body { background-attachment: scroll; }
            .login-card { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="login-card-wrapper">
        <div class="login-card">
            <div class="brand-logo">
                <img src="static/image/logo 2.jpg" alt="" style="height: 30px; width: auto; vertical-align: middle;">
            </div>
            <h2>Competitor Login</h2>

            <div class="flash-msg">{{ message }}</div>

            <form action="/login" method="POST">
                <div class="input-group">
                    <label>Email Address</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="Enter your registered email" required>
                </div>

                <div class="input-group" style="margin-bottom: 10px;">
                    <label>Secure Password</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                
                <div style="text-align: right; margin-bottom: 25px;">
                    <a href="#" style="font-size: 0.8rem; color: #eee; text-decoration: none; text-shadow: 0 1px 1px rgba(0,0,0,0.3);">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">
                    Access Dashboard <i class="fas fa-sign-in-alt" style="margin-left: 8px;"></i>
                </button>
            </form>

            <div class="footer-links">
                New to the competition? <a href="/">Register Now</a>
            </div>
        </div>
    </div>

</body>
</html>

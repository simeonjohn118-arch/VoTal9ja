<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoTal9ja Contestant | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* VoTal9ja Premium Theme Variables */
        :root {
            --bg: #0b132b;
            --card-bg: rgba(29, 53, 87, 0.4);
            --navy: #1d3557;
            --red: #E63946;
            --accent: #457b9d;
            --text-gold: #f1faee;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body { 
            background: radial-gradient(circle at top right, #1d3557, #0b132b);
            color: var(--text-gold);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background: rgba(11, 19, 43, 0.8);
            backdrop-filter: blur(15px);
            padding: 15px 5%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(230, 57, 70, 0.3);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }
        
        .page-title { 
            font-size: 0.8rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--red);
        }

        .logout { 
            color: var(--text-gold); 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.85rem; 
            transition: 0.3s;
        }
        .logout:hover { color: var(--red); }

        .main-content {
            margin-top: 100px; 
            padding: 20px 5%;
            max-width: 1000px; 
            margin-left: auto;
            margin-right: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- THE PREMIUM PROFILE SECTION --- */
        .profile-row { 
            text-align: center; 
            margin-bottom: 40px; 
            width: 100%; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-square-container {
            width: 130px; 
            height: 130px;
            background: var(--card-bg);
            border: 2px solid var(--accent);
            border-radius: 20px; /* Matching the Admin Tile feel */
            overflow: hidden;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .profile-square-container:hover {
            border-color: var(--red);
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 0 25px rgba(230, 57, 70, 0.4);
        }

        .profile-square-container img { 
            width: 100%; height: 100%; object-fit: cover; 
        }

        .upload-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(230, 57, 70, 0.7);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.3s ease;
        }

        .profile-square-container:hover .upload-overlay { opacity: 1; }

        .contestant-name { font-size: 1.8rem; font-weight: 700; color: var(--text-gold); text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .contestant-no { 
            display: inline-block;
            background: var(--red); 
            color: #fff; 
            padding: 5px 15px; 
            border-radius: 50px; 
            font-size: 0.7rem; 
            font-weight: 800;
            margin-top: 8px;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.3);
        }

        /* Unique Voting Link Section */
        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .link-card input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--glass);
            border-radius: 10px;
            font-size: 0.85rem;
            background: rgba(255,255,255,0.05);
            color: var(--text-gold);
            outline: none;
        }

        /* Action Grid Styling (Compact Tiles) */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; 
            width: 100%;
        }

        .action-box {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
            border-radius: 20px;
            padding: 25px; 
            text-align: center;
            transition: 0.4s;
            min-height: 220px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .action-box:hover {
            transform: translateY(-8px);
            border-color: var(--red);
            background: rgba(230, 57, 70, 0.05);
        } 

        .action-box i { font-size: 2.2rem; color: var(--text-gold); margin-bottom: 15px; transition: 0.3s; }
        .action-box:hover i { color: var(--red); transform: scale(1.1); }
        .action-box h3 { margin-bottom: 8px; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-gold); }
        .action-box p { color: rgba(241, 250, 238, 0.6); font-size: 0.8rem; margin-bottom: 15px; }

        .action-btn {
            background-color: var(--navy);
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid var(--glass);
            cursor: pointer;
            width: 100%;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-btn:hover { background-color: var(--red); border-color: var(--red); box-shadow: 0 5px 15px rgba(230, 57, 70, 0.4); }

        /* Receipt Form Styling */
        .receipt-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass);
            border-radius: 8px;
            font-size: 0.8rem;
            color: white;
            outline: none;
        }
        .receipt-form input:focus { border-color: var(--accent); }

        /* Toast Styling */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .toast {
            background: var(--navy);
            color: #fff;
            padding: 15px 25px;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid var(--red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.fade-out { animation: fadeOut 0.4s ease forwards; }
        @keyframes fadeOut { to { transform: translateX(100%); opacity: 0; } }

        @media (max-width: 768px) {
            .action-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <header>
        <div class="logo-area">
            <a href="/">
                <img src="{{ url_for('static', filename='image/logo 2.jpg') }}" alt="VoTal9ja Logo"; style="height: 20px; width: auto; vertical-align: middle;">
            </a>
        </div>
        <a href="/" class="logout"><i class="fas fa-power-off"></i> Sign Out</a>
    </header>

    <div class="main-content">
        
        <div class="profile-row">
            <div class="profile-square-container" onclick="document.getElementById('profilePicInput').click()">
                <img id="profilePreview" src="{{ url_for('static', filename='uploads/' + user.profile_pic) if user.profile_pic else 'https://via.placeholder.com/200x200?text=Upload+Photo' }}" alt="Contestant Photo">
                <div class="upload-overlay">
                    <i class="fas fa-camera"></i>
                    <span style="font-size:0.7rem; font-weight:bold;">CHANGE PHOTO</span>
                </div>
            </div>
            
            <input type="file" id="profilePicInput" style="display:none" accept="image/*">

            <div class="contestant-name">{{ user.fullname }}</div>
            <div class="contestant-no">VT9J-{{ "%05d" % user.id }}</div>
        </div>

        <div class="link-card">
            <i class="fas fa-share-alt" style="color:var(--red)"></i>
            <input type="text" value="{{ url_for('vote_for_contestant', contestant_id=user.id, _external=True) }}" id="myVotingLink" readonly>
            <button onclick="copyVotingLink()" class="action-btn" style="width:auto; padding: 12px 25px;">Copy</button>
        </div>

        <div class="action-grid">
            
            <div class="action-box">
                <i class="fas fa-video"></i>
                <h3>Upload Content</h3>
                <p>Submit your performance for review.</p>
                <form id="uploadForm" enctype="multipart/form-data">
                    <input type="file" id="videoInput" name="video" accept="video/*" style="display:none">
                    <button type="button" class="action-btn" onclick="document.getElementById('videoInput').click()">Select Video</button>
                </form>
            </div>

            <div class="action-box">
                <i class="fas fa-shield-check"></i>
                <h3>Verify Votes</h3>
                <p>Submit OPay receipts for validation.</p>
                <form action="{{ url_for('upload_receipt') }}" method="POST" enctype="multipart/form-data" class="receipt-form">
                    <input type="text" name="transaction_id" placeholder="Transaction ID" required>
                    <input type="file" name="receipt_image" accept="image/*" required>
                    <button type="submit" class="action-btn">Submit Proof</button>
                </form>
            </div>

            <div class="action-box">
                <i class="fas fa-analytics"></i>
                <h3>Leaderboard</h3>
                <p>Track your ranking and vote count.</p>
                <a href="/ranking.html" class="action-btn">Check Stats</a>
            </div>

            <div class="action-box">
                <i class="fas fa-gavel"></i>
                <h3>Handbook</h3>
                <p>Review the official contest rules.</p>
                <a href="rules.html" class="action-btn">Read Rules</a>
            </div>

        </div>
    </div>

    <script>
        function copyVotingLink() {
            var copyText = document.getElementById("myVotingLink");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            showToast("Voting link copied!");
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-shield-alt" style="color:var(--red)"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        document.getElementById('profilePicInput').addEventListener('change', function() {
            if(this.files[0]) {
                const formData = new FormData();
                formData.append('profile_pic', this.files[0]);
                const reader = new FileReader();
                reader.onload = function(e) { document.getElementById('profilePreview').src = e.target.result; };
                reader.readAsDataURL(this.files[0]);
                fetch('/upload_publicity_photo', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => showToast("Profile updated!"))
                .catch(err => showToast("Upload failed."));
            }
        });

        document.getElementById('videoInput').addEventListener('change', function() {
            if(this.files[0]) {
                const formData = new FormData();
                formData.append('video', this.files[0]);
                const btn = document.querySelector('#uploadForm .action-btn');
                btn.innerText = "Processing...";
                fetch('/upload_video', { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    showToast(data.message);
                    setTimeout(() => location.reload(), 1500);
                })
                .catch(error => {
                    showToast("Upload failed.");
                    btn.innerText = "Select Video";
                });
            }
        });

document.getElementById('profilePicInput').onchange = function() {
    let file = this.files[0];
    if (file) {
        let formData = new FormData();
        // This MUST match the name in your request.files['profile_pic'] in app.py
        formData.append('profile_pic', file); 

        fetch('/upload_profile_pic', { // Make sure this isn't 'upload_publicity_photo'
    method: 'POST',
    body: formData
})
        .then(response => {
            if (!response.ok) {
                throw new Error('Server responded with ' + response.status);
            }
            return response.json();
        })
        .then(data => {
            if (data.success) {
                document.getElementById('profilePreview').src = data.image_url;
                alert('Success! Your profile photo is updated.');
            } else {
                alert('Upload failed: ' + data.error);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Connection Error: ' + error.message);
        });
    }
};
    </script>
</body>
</html>

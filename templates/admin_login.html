<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | VoTal9ja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b132b;
            --navy: #1d3557;
            --red: #E63946;
            --accent: #457b9d;
            --text-gold: #f1faee;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1d3557, #0b132b);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-gold);
            overflow: hidden;
        }

        /* Login Card */
        .login-card {
            background: rgba(29, 53, 87, 0.4);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-area img {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        h2 {
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 800;
        }

        /* Form Styling */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.1rem;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--red);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.4);
            letter-spacing: 4px;
        }

        /* Flash Messages */
        .alert {
            background: rgba(230, 57, 70, 0.2);
            border: 1px solid var(--red);
            color: #ffcbd1;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: rgba(241, 250, 238, 0.4);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <a href="/">
                <img src="{{ url_for('static', filename='image/logo 2.jpg') }}" alt="VoTal9ja Logo">
            </a>
        </div>
        <h2>Admin Portal</h2>
          
       <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Master Username" required autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="System Password" required>
            </div>

            <button type="submit" class="login-btn">Secure Login</button>
        </form>

        <footer>
            POWERED BY VOTAL9JA CORE v3.14
        </footer>
    </div>

</body>
</html>

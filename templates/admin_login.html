<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | VoTal9ja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b132b;
            --navy: #1d3557;
            --red: #E63946;
            --accent: #457b9d;
            --text-gold: #f1faee;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(rgba(11, 19, 43, 0.75), rgba(11, 19, 43, 0.85)), url('https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-gold);
            overflow: hidden;
            position: relative;
        }

        /* Ambient glowing background behind card */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(230, 57, 70, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Container providing the absolute framing context for the moving border */
        .login-card-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 3px; /* Controls thickness of the LED track line */
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(230, 57, 70, 0.15);
            z-index: 1;
        }

        /* LED Moving Border Asset Track Layer */
        .login-card-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                var(--red), 
                transparent, 
                var(--accent), 
                transparent, 
                var(--red)
            );
            animation: ledBorderRotate 4s linear infinite;
            z-index: -2;
        }

        /* High Precision LED Tracking Rotation Keyframe */
        @keyframes ledBorderRotate {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Fully Transparent Login Card Inner Surface */
        .login-card {
            background: transparent; /* Fully transparent container surface */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            padding: 50px 40px;
            border-radius: 27px; /* Subtly shorter to clear inner wrapper arc */
            text-align: center;
            position: relative;
        }

        /* Background occlusion sheet behind text to secure readability */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 19, 43, 0.45);
            border-radius: 27px;
            z-index: -1;
            pointer-events: none;
        }

        .logo-area img {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        h2 {
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Form Styling */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.1rem;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(11, 19, 43, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--red);
            background: rgba(11, 19, 43, 0.8);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.5);
            letter-spacing: 4px;
        }

        /* Flash Messages */
        .alert {
            background: rgba(230, 57, 70, 0.2);
            border: 1px solid var(--red);
            color: #ffcbd1;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: rgba(241, 250, 238, 0.5);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="login-card-wrapper">
        <div class="login-card">
            <div class="logo-area">
                <a href="/">
                    <img src="{{ url_for('static', filename='image/logo 2.jpg') }}" alt="VoTal9ja Logo">
                </a>
            </div>
            <h2>Admin Portal</h2>
              
           <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Master Username" required autocomplete="off">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="System Password" required>
                </div>

                <button type="submit" class="login-btn">Secure Login</button>
            </form>

            <footer>
                POWERED BY VOTAL9JA CORE v3.14
            </footer>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Onboarding | VoTal9ja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b132b;
            --navy: #1d3557;
            --red: #E63946;
            --accent: #457b9d;
            --text-gold: #f1faee;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: radial-gradient(circle at bottom right, #1d3557, #0b132b);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-gold);
        }

        .staff-card {
            background: rgba(29, 53, 87, 0.4);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(230, 57, 70, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .icon-header i {
            font-size: 2.5rem;
            color: var(--red);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(230, 57, 70, 0.3));
        }

        h2 { font-size: 1.3rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; color: var(--red); }
        p.subtitle { font-size: 0.75rem; color: var(--accent); margin-bottom: 25px; font-weight: bold; text-transform: uppercase; }

        .field-group { position: relative; margin-bottom: 15px; }
        .field-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 1rem; }
        .field-group input {
            width: 100%; padding: 14px 15px 14px 45px;
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: white; font-size: 0.95rem; transition: 0.3s; outline: none;
        }

        .field-group input:focus { border-color: var(--red); background: rgba(255, 255, 255, 0.1); }

        .create-btn {
            width: 100%; padding: 15px; background: var(--red); color: white;
            border: none; border-radius: 12px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.4s; margin-top: 10px;
        }

        .create-btn:hover { letter-spacing: 3px; box-shadow: 0 0 20px rgba(230, 57, 70, 0.5); }

        .cancel-link { display: inline-block; margin-top: 20px; font-size: 0.75rem; color: rgba(241, 250, 238, 0.4); text-decoration: none; text-transform: uppercase; }
        .cancel-link:hover { color: var(--red); }

        .status-msg { background: rgba(255, 183, 3, 0.1); border: 1px solid #ffb703; color: #ffb703; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="staff-card">
        <div class="icon-header">
            <i class="fas fa-user-shield"></i>
        </div>
        <h2>Personnel Registry</h2>
        <p class="subtitle">Authorize New System Staff</p>
         
        <form method="POST">
            <div class="field-group">
                <i class="fas fa-id-card"></i>
                <input type="text" name="full_name" placeholder="Full Legal Name" required>
            </div>

            <div class="field-group">
                <i class="fas fa-at"></i>
                <input type="text" name="username" placeholder="Assigned Username" required autocomplete="off">
            </div>

            <div class="field-group">
                <i class="fas fa-key"></i>
                <input type="password" name="password" placeholder="Staff Temporary Password" required>
            </div>

            <button type="submit" class="create-btn">Grant System Access</button>
        </form>

        <a href="{{ url_for('admin_master') }}" class="cancel-link">Return to Console</a>
    </div>

</body>
</html>

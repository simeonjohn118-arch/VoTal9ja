<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoTal9ja | Live Rankings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #1d3557; color: #1d3557; }

        .container {
            margin-top: 50px;
            padding: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        .header-box { margin-bottom: 40px; }
        .header-box h1 { font-size: 1.8rem; color: #1d3557; }
        .header-box p { color: #E63946; font-weight: bold; font-size: 0.9rem; }

        /* Ranking Table/List */
        .rank-list {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid #eee;
        }

        .rank-number { font-weight: 900; color: #E63946; width: 30px; }
        .contestant-info { flex-grow: 1; text-align: left; margin-left: 15px; }
        .vote-count { font-weight: bold; color: #1d3557; }

        /* --- THE FAINTED "NO CONTEST" OVERLAY --- */
        .empty-state {
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.4; /* This makes it faint */
            filter: grayscale(100%);
        }

        .empty-state i { font-size: 4rem; margin-bottom: 20px; }
        .empty-state h2 { font-size: 1.2rem; margin-bottom: 10px; }
        .empty-state p { font-size: 0.9rem; max-width: 250px; }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: #1d3557;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <h1>Competition Standings</h1>
            <p>VoTal9ja Season 1</p>
        </div>

        <div class="rank-list">
            
                <div class="rank-item">
                    <div class="rank-number"></div>
                    <div class="contestant-info">
                        <strong></strong>
                    </div>
                    <div class="vote-count">Votes</div>
                </div>
                <div class="empty-state">
                    <i class="fas fa-trophy"></i>
                    <h2>No active contest</h2>
                    <p>Ranking data is currently unavailable as there is no competition ongoing at the moment.</p>
                </div>
            
        </div>

        <a href="contestant.html" class="back-btn"><i class="fas fa-arrow-left"></i> Return to Profile</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoTal9ja | Live Rankings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* Modernized Body with Warm Palace Luxury (Removed the heavy blue tones) */
        body { 
            background: linear-gradient(135deg, rgba(13, 13, 17, 0.75), rgba(26, 17, 5, 0.70)), 
                        url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1600&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            color: #f8f9fa; 
            min-height: 100vh;
        }

        /* Clean and padded logo area */
        .logo-area {
            padding: 20px 30px;
        }
        .logo-area img {
            height: 35px !important; /* Made slightly more visible for a modern header feel */
            width: auto;
            vertical-align: middle;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container {
            margin-top: 30px;
            padding: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        .header-box { margin-bottom: 40px; }
        .header-box h1 { font-size: 2.2rem; color: #ffffff; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .header-box p { color: #E63946; font-weight: bold; font-size: 1rem; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.4); }

        /* Modernized Glass Ranking Container with Animated LED Moving Border Loop */
        .rank-list {
            position: relative;
            background: rgba(15, 15, 20, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            z-index: 1;
        }

        /* Continuous LED Border Effect Animation Track - Softened and Subdued Glow */
        .rank-list::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent 30%,
                rgba(179, 146, 18, 0.6) 45%,
                rgba(153, 27, 27, 0.6) 55%,
                transparent 70%
            );
            animation: led-rotate 5s linear infinite;
            z-index: -2;
        }

        /* Inner Content Mask protecting the transparent crystal card space */
        .rank-list::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: rgba(18, 18, 24, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 14px;
            z-index: -1;
        }

        /* LED Rotation Frame Settings */
        @keyframes led-rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Modernized List Item Card */
        .rank-item {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: transparent;
            transition: all 0.3s ease;
            z-index: 2;
        }
        .rank-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .rank-number { font-weight: 900; color: #E63946; width: 30px; font-size: 1.2rem; }
        .contestant-info { flex-grow: 1; text-align: left; margin-left: 15px; color: #ffffff; }
        .vote-count { font-weight: bold; color: #ffd700; background: rgba(255, 215, 0, 0.12); padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; border: 1px solid rgba(255, 215, 0, 0.15); }

        /* --- THE FAINTED "NO CONTEST" OVERLAY --- */
        .empty-state {
            position: relative;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.5; /* Adjusted slightly for visibility against dynamic background */
            filter: grayscale(100%);
            color: #ffffff;
            z-index: 2;
        }

        .empty-state i { font-size: 4rem; margin-bottom: 20px; color: #ffd700; }
        .empty-state h2 { font-size: 1.4rem; margin-bottom: 10px; font-weight: 600; }
        .empty-state p { font-size: 0.95rem; max-width: 280px; line-height: 1.5; opacity: 0.8; }

        /* Modernized Back Button */
        .back-btn {
            display: inline-block;
            margin-top: 35px;
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.06);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .back-btn i { margin-right: 8px; transition: transform 0.2s ease; }
        .back-btn:hover {
            background: #ffffff;
            color: #0d0d11;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .back-btn:hover i { transform: translateX(-4px); }
    </style>
</head>
<body>
<div class="logo-area">
            <a href="/">
                <img src="{{ url_for('static', filename='image/logo 2.jpg') }}" alt="VoTal9ja Logo" style="height: 15px; width: auto; vertical-align: middle;">
            </a>
        </div>

    <div class="container">
        <div class="header-box">
            <h1>Competition Standings</h1>
            <p>VoTal9ja Season 1</p>
        </div>

        <div class="rank-list">
            
                <div class="rank-item">
                    <div class="rank-number"></div>
                    <div class="contestant-info">
                        <strong></strong>
                    </div>
                    <div class="vote-count">Votes</div>
                </div>
                <div class="empty-state">
                    <i class="fas fa-trophy"></i>
                    <h2>No active contest</h2>
                    <p>Ranking data is currently unavailable as there is no competition ongoing at the moment.</p>
                </div>
            
        </div>

        <a href="/contestant" class="back-btn"><i class="fas fa-arrow-left"></i> Return to Profile</a>
    </div>

</body>
</html>
